  <text x="650" y="295" font-family="Inter,sans-serif" font-weight="700" font-size="36" fill="#0074FF">13</text>
  <text x="650" y="318" font-family="Inter,sans-serif" font-weight="600" font-size="14" fill="#EFF3FC">Markdown Patterns</text>
  <text x="650" y="338" font-family="Inter,sans-serif" font-weight="400" font-size="12" fill="#5A6B8A">Headings, bold, italic, code, links, images, lists, tables, blockquotes</text>

