  <text x="104" y="65" font-family="Inter,sans-serif" font-weight="600" font-size="18" fill="url(#brand)">AEL · MARKDOWN CMS</text>
  <text x="104" y="82" font-family="'Jetbrains Mono',monospace" font-size="9" fill="#7F8CFF">Lightweight Editor with Live Preview — Custom Markdown Parser</text>
  <rect x="920" y="45" width="220" height="38" rx="20" fill="rgba(0,116,255,0.08)" stroke="rgba(0,116,255,0.15)" stroke-width="1"/>
  <text x="940" y="68" font-family="'Jetbrains Mono',monospace" font-size="11" fill="#0074FF" font-weight="600">3 FORMATS</text>

  <line x1="40" y1="115" x2="1160" y2="115" stroke="rgba(0,116,255,0.06)" stroke-width="1"/>

  <text x="60" y="185" font-family="Inter,sans-serif" font-weight="800" font-size="44" fill="#EFF3FC">Markdown CMS</text>
  <text x="60" y="220" font-family="Inter,sans-serif" font-weight="400" font-size="16" fill="#7F8CFF">A lightweight markdown editor with live preview, split-pane interface, document management, and 3 export formats — powered by a custom zero-dependency parser</text>

