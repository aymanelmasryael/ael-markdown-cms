  <text x="365" y="295" font-family="Inter,sans-serif" font-weight="700" font-size="36" fill="#0074FF">3</text>
  <text x="365" y="318" font-family="Inter,sans-serif" font-weight="600" font-size="14" fill="#EFF3FC">Export Formats</text>
  <text x="365" y="338" font-family="Inter,sans-serif" font-weight="400" font-size="12" fill="#5A6B8A">HTML, Markdown, and Plain Text with one-click download</text>

  <rect x="630" y="260" width="255" height="130" rx="12" fill="rgba(0,116,255,0.04)" stroke="rgba(0,116,255,0.10)" stroke-width="1"/>
